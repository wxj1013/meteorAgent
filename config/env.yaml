# 日志级别
log:
  level: "INFO"

# python版本
python:
  version: "3.10.3"

# GPU版本和可用性
cuda:
  available: true
  version: "12.1"
  device: "NVIDIA GeForce RTX 2070"

# 是否支持自行安装第三方库
constraints:
  allow_install: false

# python第三方库列表
packages:
  torch: "2.5.1+cu121"
  torchvision: "0.20.1+cu121"
  transformers: "4.57.3"
  numpy: "2.0.0"
  matplotlib: "3.9.3"

# agent的planner配置
planner:


# agent的coder配置
coder:
  llm_model: "deepseek-chat" 
  api_key: ""
  max_retry: 3
  timeout: 30